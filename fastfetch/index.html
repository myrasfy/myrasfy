<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1200" />
    <title>myrasfy@github</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="./avatar.png" />
    <link rel="stylesheet" href="./main.css" />
  </head>
  <body>
    <div class="terminal">
      <div class="prompt-line">
        <span class="p-user">myrasfy</span><span class="p-at">@</span
        ><span class="p-host">github</span><span class="p-colon">:</span
        ><span class="p-path">~</span><span class="p-dollar">$</span
        ><span class="p-cmd"> fastfetch</span>
      </div>

      <div class="fetch-content">
        <div class="avatar-wrap">
          <img class="avatar-img" src="./avatar.png" alt="avatar" />
        </div>

        <div class="info-panel">
          <div class="dots-row top-dots">
            <span class="dot" style="--c: #555555"></span>
            <span class="dot" style="--c: #cc241d"></span>
            <span class="dot" style="--c: #98971a"></span>
            <span class="dot" style="--c: #d79921"></span>
            <span class="dot" style="--c: #458588"></span>
            <span class="dot" style="--c: #b16286"></span>
            <span class="dot" style="--c: #689d6a"></span>
            <span class="dot" style="--c: #a89984"></span>
          </div>

          <div class="fetch-username">
            <span class="fn-user">myrasfy</span><span class="fn-at">@</span
            ><span class="fn-host">github</span>
          </div>

          <div class="fetch-separator"></div>

          <div class="info-row">
            <span class="label">Gender:</span><span class="val">Male</span>
          </div>
          <div class="info-row">
            <span class="label">Languages:</span
            ><span class="val">Russian, English</span>
          </div>
          <div class="info-row">
            <span class="label">Country:</span><span class="val">Russia</span>
          </div>
          <div class="info-row">
            <span class="label">Hobbies:</span
            ><span class="val">Games, Music, Some sports</span>
          </div>
          <div class="info-row">
            <span class="label">Specialisation:</span
            ><span class="val">DevOps Engineer</span>
          </div>

          <div class="dots-row bottom-dots">
            <span class="dot" style="--c: #555555"></span>
            <span class="dot" style="--c: #cc241d"></span>
            <span class="dot" style="--c: #98971a"></span>
            <span class="dot" style="--c: #d79921"></span>
            <span class="dot" style="--c: #458588"></span>
            <span class="dot" style="--c: #b16286"></span>
            <span class="dot" style="--c: #689d6a"></span>
            <span class="dot" style="--c: #a89984"></span>
          </div>
        </div>
      </div>

      <div class="prompt-line">
        <span class="p-user">myrasfy</span><span class="p-at">@</span
        ><span class="p-host">github</span><span class="p-colon">:</span
        ><span class="p-path">~</span><span class="p-dollar">$</span
        ><span class="cursor">█</span>
      </div>
    </div>
  </body>
</html>
